services:
  postgres:
    image: postgres:16-alpine
    container_name: hw5-feast-postgres
    environment:
      POSTGRES_USER: feast
      POSTGRES_PASSWORD: feast
      POSTGRES_DB: feast
    ports:
      - "5432:5432"
    volumes:
      - feast_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feast -d feast"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  feast_pgdata:
