project: feature_repo
provider: local
registry:
    registry_type: sql
    path: postgresql://feast:feast@localhost:5432/feast?sslmode=disable
    cache_ttl_seconds: 60
    sqlalchemy_config_kwargs:
        echo: false
        pool_pre_ping: true
online_store:
    type: postgres
    host: localhost
    port: 5432
    database: feast
    db_schema: public
    user: feast
    password: feast
    sslmode: disable
offline_store:
    type: postgres
    host: localhost
    port: 5432
    database: feast
    db_schema: public
    user: feast
    password: feast
    sslmode: disable
entity_key_serialization_version: 3
